<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Funcionarios · Carteras</title>
<style>
  :root{
    --navy:#14305c; --navy2:#21609c; --blue:#2b6cb0; --blue-soft:#ebf3fb;
    --green:#1f7a4d; --green-soft:#e7f4ec; --indigo:#4338ca;
    --bg:#eef2f7; --card:#ffffff; --ink:#16202e; --muted:#64748b;
    --line:#e3e8ef; --amber:#b45309; --amber-soft:#fdf2e3; --red:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}

  /* HEADER */
  .header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(10,30,60,.25);}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:11px;}
  .header h1{font-size:1.05rem;font-weight:800;letter-spacing:-.2px;line-height:1.15;}
  .header h1 span{font-size:.72rem;font-weight:500;opacity:.78;display:block;margin-top:2px;letter-spacing:.3px;}
  .head-btns{display:flex;gap:6px;flex-shrink:0;}
  .hbtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.32);color:#fff;border-radius:8px;padding:7px 11px;font-size:.78rem;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap;}
  .hbtn:hover{background:rgba(255,255,255,.26);}
  .hbtn.on{background:#fff;color:var(--navy);border-color:#fff;}

  .search-box{background:#fff;border-radius:11px;padding:11px 14px;display:flex;align-items:center;gap:9px;box-shadow:0 1px 4px rgba(0,0,0,.12);}
  .search-box .ico{font-size:1rem;opacity:.55;}
  .search-box input{flex:1;border:none;outline:none;font-size:1rem;color:var(--ink);background:transparent;}
  .search-box input::placeholder{color:#9aa7b8;}
  .clear-btn{background:none;border:none;color:#9aa7b8;font-size:1.2rem;cursor:pointer;padding:0 2px;line-height:1;}

  .filters{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .filter-btn{background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap;}
  .filter-btn:hover{background:rgba(255,255,255,.24);}
  .filter-btn.active{background:#fff;color:var(--navy);}

  /* DASHBOARD */
  .dash{background:#fff;border-bottom:1px solid var(--line);padding:16px 14px 18px;}
  .dash-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:13px;}
  .dash-head h2{font-size:.82rem;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--navy);}
  .dash-head .ts{font-size:.7rem;color:var(--muted);}

  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:9px;margin-bottom:14px;}
  .tile{border:1px solid var(--line);border-radius:11px;padding:12px 13px;background:#fff;position:relative;overflow:hidden;}
  .tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue);}
  .tile.total::before{background:var(--navy);}
  .tile.misc::before{background:var(--blue);}
  .tile.cen::before{background:var(--green);}
  .tile.add::before{background:var(--green);}
  .tile.del::before{background:var(--red);}
  .tile .num{font-size:1.7rem;font-weight:800;line-height:1;letter-spacing:-.5px;}
  .tile .lbl{font-size:.7rem;color:var(--muted);font-weight:600;margin-top:5px;text-transform:uppercase;letter-spacing:.4px;}
  .tile.add .num{color:var(--green);}
  .tile.del .num{color:var(--red);}

  .sub-title{font-size:.72rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:4px 0 9px;}

  .carteras{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
  .cbox{border:1px solid var(--line);border-radius:11px;padding:11px;text-align:center;}
  .cbox .cnum{font-size:1.5rem;font-weight:800;color:var(--navy);line-height:1;}
  .cbox .clbl{font-size:.72rem;color:var(--muted);font-weight:600;margin-top:5px;}
  .cbox .cbar{height:5px;border-radius:3px;background:var(--blue);margin-top:8px;}
  .cbox:nth-child(1) .cbar{background:#2b6cb0;}
  .cbox:nth-child(2) .cbar{background:#0e7490;}
  .cbox:nth-child(3) .cbar{background:#4338ca;}

  .zones{display:flex;flex-direction:column;gap:7px;}
  .zrow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;}
  .zrow .zname{font-size:.8rem;font-weight:600;color:var(--ink);}
  .zrow .zcount{font-size:.82rem;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;}
  .ztrack{grid-column:1 / -1;height:7px;background:#eef2f7;border-radius:4px;overflow:hidden;margin-top:-2px;}
  .zfill{height:100%;background:linear-gradient(90deg,var(--navy2),var(--blue));border-radius:4px;}
  .zrow.muted .zname,.zrow.muted .zcount{color:var(--muted);}
  .zrow.muted .zfill{background:#cbd5e1;}

  /* STATS BAR */
  .stats{background:#fff;padding:9px 16px;font-size:.8rem;color:var(--muted);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px;position:sticky;top:0;z-index:50;}
  .stats strong{color:var(--blue);}

  /* CARDS */
  .results{padding:12px 12px 90px;}
  .divider{font-size:.72rem;font-weight:700;color:#94a3b8;letter-spacing:.6px;text-transform:uppercase;padding:12px 4px 5px;display:flex;align-items:center;gap:6px;}
  .divider .dc{margin-left:auto;background:#eef2f7;color:#64748b;border-radius:10px;padding:1px 8px;font-size:.68rem;font-weight:700;letter-spacing:0;text-transform:none;}
  .card{background:#fff;border-radius:12px;margin-bottom:9px;padding:13px 14px;box-shadow:0 1px 3px rgba(15,30,60,.07);border-left:4px solid var(--blue);}
  .card.tipo-miscel{border-left-color:var(--blue);}
  .card.tipo-cen{border-left-color:var(--green);}
  .card-name{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.25;}
  .card-name .highlight{background:#fde68a;border-radius:3px;padding:0 2px;}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
  .tag{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;border-radius:6px;padding:2px 8px;font-weight:600;}
  .tag-cartera{background:#e8eefc;color:var(--indigo);}
  .tag-tipo-misc{background:var(--blue-soft);color:#1e5d96;}
  .tag-tipo-cen{background:var(--green-soft);color:var(--green);}
  .tag-cod{background:#f1f5f9;color:#475569;}
  .tag-puesto{background:#f1f5f9;color:#475569;}
  .tag-zona{background:#fef3e7;color:var(--amber);}
  .tag-obs{background:var(--amber-soft);color:var(--amber);}
  .card-centro{font-size:.86rem;color:#475569;}
  .card-centro .highlight{background:#fde68a;border-radius:3px;padding:0 2px;}
  .card-meta{font-size:.78rem;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 12px;}
  .card-meta b{color:#334155;font-weight:600;}
  .card-actions{display:flex;gap:8px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
  .btn-edit{background:var(--blue-soft);color:#1e5d96;border:none;border-radius:7px;padding:6px 13px;font-size:.78rem;cursor:pointer;font-weight:700;}
  .btn-delete{background:#fdeced;color:var(--red);border:none;border-radius:7px;padding:6px 13px;font-size:.78rem;cursor:pointer;font-weight:700;}

  .no-results{text-align:center;padding:54px 20px;color:#94a3b8;}
  .no-results .icon{font-size:2.6rem;margin-bottom:10px;}
  .no-results p{font-size:.92rem;}

  /* FAB */
  .fab{position:fixed;bottom:22px;right:18px;background:var(--blue);color:#fff;border:none;border-radius:50px;padding:14px 20px;font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(43,108,176,.45);z-index:200;display:none;}
  .fab:hover{background:var(--navy);}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(12,24,45,.55);z-index:300;overflow-y:auto;padding:18px;}
  .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;}
  .modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:520px;margin:auto;}
  .modal h2{font-size:1.08rem;font-weight:800;margin-bottom:18px;color:var(--navy);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  .form-group.full{grid-column:1 / -1;}
  .form-group label{font-size:.76rem;font-weight:700;color:#475569;}
  .form-group input,.form-group select,.form-group textarea{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:.9rem;outline:none;font-family:inherit;background:#f8fafc;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);background:#fff;}
  .form-group textarea{resize:vertical;min-height:58px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .btn-save{flex:1;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;}
  .btn-save:hover{background:var(--navy);}
  .btn-cancel{background:#f1f5f9;color:#475569;border:1px solid var(--line);border-radius:10px;padding:12px 20px;font-size:.95rem;cursor:pointer;font-weight:600;}

  .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(12,24,45,.55);z-index:400;align-items:center;justify-content:center;padding:18px;}
  .confirm-overlay.open{display:flex;}
  .confirm-box{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:350px;text-align:center;}
  .confirm-box h3{margin-bottom:8px;color:var(--ink);font-size:1.02rem;}
  .confirm-box p{font-size:.86rem;color:var(--muted);margin-bottom:18px;}
  .confirm-actions{display:flex;gap:10px;}
  .btn-confirm-delete{flex:1;background:var(--red);color:#fff;border:none;border-radius:10px;padding:11px;font-size:.9rem;font-weight:700;cursor:pointer;}
  .btn-confirm-cancel{flex:1;background:#f1f5f9;color:#475569;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:.9rem;cursor:pointer;font-weight:600;}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:22px;font-size:.86rem;font-weight:600;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 6px 18px rgba(10,30,60,.4);}
  .toast.show{opacity:1;}

  .admin-extra{margin-top:14px;display:none;}
  .admin-extra.show{display:block;}
  .reset-btn{width:100%;background:#fff;border:1px dashed #f0b4b4;color:var(--red);border-radius:10px;padding:9px;font-size:.78rem;font-weight:700;cursor:pointer;}

  @media (max-width:480px){
    .form-grid{grid-template-columns:1fr;}
    .form-group.full{grid-column:1;}
    .tile .num{font-size:1.5rem;}
    .header h1{font-size:.98rem;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Directorio de Funcionarios <span>Carteras · Misceláneos &amp; CEN CINAI</span></h1>
    <div class="head-btns">
      <button class="hbtn on" id="dashBtn" onclick="toggleDash()">Resumen</button>
      <button class="hbtn" id="adminBtn" onclick="toggleAdmin()">Administrar</button>
    </div>
  </div>
  <div class="search-box">
    <span class="ico">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por nombre, centro, código, zona, banco o cuenta…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()" style="display:none">✕</button>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('Cartera 1',this)">Cartera 1</button>
    <button class="filter-btn" onclick="setFilter('Cartera 2',this)">Cartera 2</button>
    <button class="filter-btn" onclick="setFilter('Cartera 3',this)">Cartera 3</button>
    <button class="filter-btn" onclick="setFilter('Misceláneos',this)">Misceláneos</button>
    <button class="filter-btn" onclick="setFilter('CEN CINAI',this)">CEN CINAI</button>
  </div>
</div>

<div class="dash" id="dashPanel"></div>

<div class="stats" id="statsBar">Cargando…</div>
<div class="results" id="results"></div>

<button class="fab" id="fabBtn" onclick="openModal()">+ Agregar funcionario</button>

<!-- MODAL AGREGAR/EDITAR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Agregar funcionario</h2>
    <div class="form-grid">
      <div class="form-group full"><label>Nombre completo *</label><input type="text" id="f_funcionario" placeholder="Nombre completo"></div>
      <div class="form-group full"><label>Centro de trabajo *</label><input type="text" id="f_centro" placeholder="Ej: BN San Rafael Alajuela"></div>
      <div class="form-group"><label>Cartera *</label><select id="f_cartera"><option value="Cartera 1">Cartera 1</option><option value="Cartera 2">Cartera 2</option><option value="Cartera 3">Cartera 3</option></select></div>
      <div class="form-group"><label>Tipo *</label><select id="f_tipo"><option value="Misceláneos">Misceláneos</option><option value="CEN CINAI">CEN CINAI</option></select></div>
      <div class="form-group"><label>Código</label><input type="text" id="f_cod" placeholder="Ej: 0092"></div>
      <div class="form-group"><label>Cédula</label><input type="text" id="f_id" placeholder="Número de cédula"></div>
      <div class="form-group"><label>Puesto</label><input type="text" id="f_puesto" placeholder="Ej: Misceláneo"></div>
      <div class="form-group"><label>Banco</label><input type="text" id="f_banco" placeholder="Ej: BAC PLANILLA"></div>
      <div class="form-group full"><label>Cuenta</label><input type="text" id="f_cuenta" placeholder="Número de cuenta"></div>
      <div class="form-group"><label>Zona / Región</label><input type="text" id="f_region" placeholder="Ej: CORREDORES (solo CEN CINAI)"></div>
      <div class="form-group"><label>Partida</label><input type="text" id="f_partida" placeholder="Partida"></div>
      <div class="form-group full"><label>Observaciones</label><textarea id="f_obs" placeholder="Observaciones o notas…"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveRecord()">Guardar</button>
    </div>
  </div>
</div>

<!-- CONFIRMAR ELIMINAR -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Eliminar funcionario</h3>
    <p id="confirmName"></p>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const ORIGINAL_COUNT = BASE_DATA.length;
const STORE_KEY = 'carteras_data_v2';

let records = JSON.parse(localStorage.getItem(STORE_KEY) || 'null') || BASE_DATA.map(r => ({...r}));
let nextId = Math.max(0, ...records.map(r => r._id || 0)) + 1;
let adminMode = false;
let dashOpen = true;
let currentFilter = 'all';
let searchTerm = '';
let editingId = null;
let deletingId = null;

function saveToStorage(){ localStorage.setItem(STORE_KEY, JSON.stringify(records)); }

function toggleAdmin(){
  adminMode = !adminMode;
  document.getElementById('adminBtn').classList.toggle('on', adminMode);
  document.getElementById('fabBtn').style.display = adminMode ? 'block' : 'none';
  renderDash(); render();
  showToast(adminMode ? 'Modo administrar activado' : 'Modo consulta activado');
}
function toggleDash(){
  dashOpen = !dashOpen;
  document.getElementById('dashBtn').classList.toggle('on', dashOpen);
  document.getElementById('dashPanel').style.display = dashOpen ? 'block' : 'none';
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}
function highlight(text, term){
  if(!term) return text;
  const esc = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp('('+esc+')','gi'),'<span class="highlight">$1</span>');
}

function computeStats(){
  const active = records;
  const s = {
    total: active.length,
    misc: active.filter(r=>r.tipo==='Misceláneos').length,
    cen: active.filter(r=>r.tipo==='CEN CINAI').length,
    c1: active.filter(r=>r.cartera==='Cartera 1').length,
    c2: active.filter(r=>r.cartera==='Cartera 2').length,
    c3: active.filter(r=>r.cartera==='Cartera 3').length,
    nuevos: active.filter(r=>!r._orig).length,
    eliminados: ORIGINAL_COUNT - active.filter(r=>r._orig).length,
    zonas: {}, sinZona: 0
  };
  active.forEach(r=>{
    const z = (r.region||'').trim();
    if(z){ s.zonas[z] = (s.zonas[z]||0)+1; } else { s.sinZona++; }
  });
  return s;
}

function renderDash(){
  const s = computeStats();
  const carteraMax = Math.max(s.c1,s.c2,s.c3,1);
  const zonasArr = Object.entries(s.zonas).sort((a,b)=>b[1]-a[1]);
  const zMax = zonasArr.length ? zonasArr[0][1] : 1;

  let zonasHtml = zonasArr.map(([name,n])=>
    '<div class="zrow"><span class="zname">'+name+'</span><span class="zcount">'+n+'</span>'+
    '<div class="ztrack"><div class="zfill" style="width:'+Math.round(n/zMax*100)+'%"></div></div></div>'
  ).join('');
  if(s.sinZona){
    zonasHtml += '<div class="zrow muted"><span class="zname">Sin zona · Misceláneos</span><span class="zcount">'+s.sinZona+'</span>'+
      '<div class="ztrack"><div class="zfill" style="width:'+Math.round(s.sinZona/zMax*100)+'%"></div></div></div>';
  }

  document.getElementById('dashPanel').innerHTML =
    '<div class="dash-head"><h2>Resumen general</h2><span class="ts">Base original: '+ORIGINAL_COUNT+' funcionarios</span></div>'+
    '<div class="tiles">'+
      '<div class="tile total"><div class="num">'+s.total+'</div><div class="lbl">Activos</div></div>'+
      '<div class="tile misc"><div class="num">'+s.misc+'</div><div class="lbl">Misceláneos</div></div>'+
      '<div class="tile cen"><div class="num">'+s.cen+'</div><div class="lbl">CEN CINAI</div></div>'+
      '<div class="tile add"><div class="num">+'+s.nuevos+'</div><div class="lbl">Nuevos</div></div>'+
      '<div class="tile del"><div class="num">−'+s.eliminados+'</div><div class="lbl">Eliminados</div></div>'+
    '</div>'+
    '<div class="sub-title">Total por cartera</div>'+
    '<div class="carteras">'+
      '<div class="cbox"><div class="cnum">'+s.c1+'</div><div class="clbl">Cartera 1</div><div class="cbar" style="width:'+Math.round(s.c1/carteraMax*100)+'%"></div></div>'+
      '<div class="cbox"><div class="cnum">'+s.c2+'</div><div class="clbl">Cartera 2</div><div class="cbar" style="width:'+Math.round(s.c2/carteraMax*100)+'%"></div></div>'+
      '<div class="cbox"><div class="cnum">'+s.c3+'</div><div class="clbl">Cartera 3</div><div class="cbar" style="width:'+Math.round(s.c3/carteraMax*100)+'%"></div></div>'+
    '</div>'+
    '<div class="sub-title">Conteo por zona · de mayor a menor</div>'+
    '<div class="zones">'+(zonasHtml||'<span style="font-size:.8rem;color:var(--muted)">Sin zonas registradas</span>')+'</div>'+
    '<div class="admin-extra'+(adminMode?' show':'')+'"><button class="reset-btn" onclick="resetData()">↺ Restablecer a la base original ('+ORIGINAL_COUNT+')</button></div>';
}

function matchFilter(r){
  if(currentFilter==='all') return true;
  if(currentFilter.startsWith('Cartera')) return r.cartera===currentFilter;
  return r.tipo===currentFilter;
}

function render(){
  const term = searchTerm.toLowerCase().trim();
  let filtered = records.filter(matchFilter);
  if(term){
    filtered = filtered.filter(r=>
      [r.funcionario,r.centro,r.cod,r.id,r.puesto,r.region,r.banco,r.cuenta,r.partida]
        .some(v=>(v||'').toLowerCase().includes(term))
    );
  }
  const total = filtered.length;
  document.getElementById('statsBar').innerHTML = (term||currentFilter!=='all')
    ? 'Mostrando <strong>'+total+'</strong> de '+records.length+' funcionarios'
    : '<strong>'+records.length+'</strong> funcionarios activos';

  if(total===0){
    document.getElementById('results').innerHTML =
      '<div class="no-results"><div class="icon">🔍</div><p>No se encontraron funcionarios'+(term?' para "<strong>'+searchTerm+'</strong>"':'')+'.<br>Probá con otro nombre, código o centro.</p></div>';
    return;
  }

  let html = '';
  if(!term && total>10){
    const grupos = {};
    filtered.forEach(r=>{ const k=r.centro||'(Sin centro)'; (grupos[k]=grupos[k]||[]).push(r); });
    Object.keys(grupos).sort((a,b)=>a.localeCompare(b,'es')).forEach(centro=>{
      html += '<div class="divider">📍 '+centro+'<span class="dc">'+grupos[centro].length+'</span></div>';
      grupos[centro].forEach(r=>html+=renderCard(r,''));
    });
  } else {
    filtered.forEach(r=>html+=renderCard(r,term));
  }
  document.getElementById('results').innerHTML = html;
}

function renderCard(r, term){
  const tipoClass = r.tipo==='Misceláneos'?'tipo-miscel':'tipo-cen';
  const tipoTag = r.tipo==='Misceláneos'?'tag-tipo-misc':'tag-tipo-cen';
  const name = term?highlight(r.funcionario||'',term):(r.funcionario||'');
  const centro = term?highlight(r.centro||'',term):(r.centro||'');
  let tags = '<span class="tag tag-cartera">'+r.cartera+'</span><span class="tag '+tipoTag+'">'+r.tipo+'</span>';
  if(r.cod) tags+='<span class="tag tag-cod">Cód. '+r.cod+'</span>';
  if(r.puesto) tags+='<span class="tag tag-puesto">'+r.puesto+'</span>';
  if(r.region) tags+='<span class="tag tag-zona">'+r.region+'</span>';
  if(!r._orig) tags+='<span class="tag tag-tipo-cen">Nuevo</span>';
  if(r.observaciones) tags+='<span class="tag tag-obs">⚠ '+r.observaciones.substring(0,46)+(r.observaciones.length>46?'…':'')+'</span>';
  let meta='';
  const m=[];
  if(r.banco) m.push('<b>Banco:</b> '+r.banco);
  if(r.cuenta) m.push('<b>Cuenta:</b> '+r.cuenta);
  if(r.partida) m.push('<b>Partida:</b> '+r.partida);
  if(m.length) meta='<div class="card-meta">'+m.join('')+'</div>';
  let actions = adminMode
    ? '<div class="card-actions"><button class="btn-edit" onclick="editRecord('+r._id+')">Editar</button><button class="btn-delete" onclick="askDelete('+r._id+')">Eliminar</button></div>'
    : '';
  return '<div class="card '+tipoClass+'"><div class="card-name">'+name+'</div><div class="card-tags">'+tags+'</div>'+
    (centro?'<div class="card-centro">'+centro+'</div>':'')+meta+actions+'</div>';
}

function setFilter(f, btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  searchTerm=''; document.getElementById('clearBtn').style.display='none'; render();
}
document.getElementById('searchInput').addEventListener('input', function(){
  searchTerm=this.value;
  document.getElementById('clearBtn').style.display=searchTerm?'block':'none';
  render();
});

function openModal(id=null){
  editingId=id;
  const fields=['funcionario','centro','cartera','tipo','cod','id','puesto','banco','cuenta','region','partida','obs'];
  if(id!==null){
    const r=records.find(x=>x._id===id);
    document.getElementById('modalTitle').textContent='Editar funcionario';
    document.getElementById('f_funcionario').value=r.funcionario||'';
    document.getElementById('f_centro').value=r.centro||'';
    document.getElementById('f_cartera').value=r.cartera||'Cartera 1';
    document.getElementById('f_tipo').value=r.tipo||'Misceláneos';
    document.getElementById('f_cod').value=r.cod||'';
    document.getElementById('f_id').value=r.id||'';
    document.getElementById('f_puesto').value=r.puesto||'';
    document.getElementById('f_banco').value=r.banco||'';
    document.getElementById('f_cuenta').value=r.cuenta||'';
    document.getElementById('f_region').value=r.region||'';
    document.getElementById('f_partida').value=r.partida||'';
    document.getElementById('f_obs').value=r.observaciones||'';
  } else {
    document.getElementById('modalTitle').textContent='Agregar funcionario';
    fields.forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value='';});
    document.getElementById('f_cartera').value='Cartera 1';
    document.getElementById('f_tipo').value='Misceláneos';
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function editRecord(id){ openModal(id); }

function saveRecord(){
  const func=document.getElementById('f_funcionario').value.trim();
  const centro=document.getElementById('f_centro').value.trim();
  if(!func||!centro){ showToast('El nombre y el centro son obligatorios'); return; }
  const reg=document.getElementById('f_region').value.trim().toUpperCase().replace('OCCODENTE','OCCIDENTE');
  const data={
    funcionario:func, centro:centro,
    cartera:document.getElementById('f_cartera').value,
    tipo:document.getElementById('f_tipo').value,
    cod:document.getElementById('f_cod').value.trim(),
    id:document.getElementById('f_id').value.trim(),
    puesto:document.getElementById('f_puesto').value.trim(),
    banco:document.getElementById('f_banco').value.trim(),
    cuenta:document.getElementById('f_cuenta').value.trim(),
    region:reg,
    partida:document.getElementById('f_partida').value.trim(),
    observaciones:document.getElementById('f_obs').value.trim(),
  };
  if(editingId!==null){
    const idx=records.findIndex(r=>r._id===editingId);
    records[idx]={...records[idx],...data};
    showToast('Funcionario actualizado');
  } else {
    records.push({...data,_id:nextId++,_orig:false});
    showToast('Funcionario agregado');
  }
  saveToStorage(); closeModal(); renderDash(); render();
}

function askDelete(id){
  deletingId=id;
  const r=records.find(x=>x._id===id);
  document.getElementById('confirmName').textContent=r.funcionario+' — '+r.centro;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){ document.getElementById('confirmOverlay').classList.remove('open'); }
function confirmDelete(){
  records=records.filter(r=>r._id!==deletingId);
  saveToStorage(); closeConfirm(); renderDash(); render();
  showToast('Funcionario eliminado');
}

function resetData(){
  if(confirm('Esto borra los cambios locales (agregados/editados/eliminados) y vuelve a la base original de '+ORIGINAL_COUNT+' funcionarios. ¿Continuar?')){
    localStorage.removeItem(STORE_KEY);
    records=BASE_DATA.map(r=>({...r}));
    nextId=ORIGINAL_COUNT+1;
    renderDash(); render(); showToast('Datos restablecidos');
  }
}

renderDash();
render();
</script>
</body>
</html>
